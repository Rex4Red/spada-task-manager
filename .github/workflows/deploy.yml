name: Deploy SPADA Task Manager

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            cd ~/spada-task-manager

            # 1. Pull latest code
            git pull origin main

            # 2. Install backend deps
            npm install

            # 3. Build frontend
            cd frontend && npm install && npm run build && cd ..

            # 4. Push schema to database
            npx prisma db push --accept-data-loss

            # 5. Rebuild Docker image & restart container
            docker build -t spada-task-manager .
            docker stop spada || true
            docker rm spada || true
            docker run -d --name spada \
              --network host \
              --restart unless-stopped \
              -v /home/ubuntu/spada-task-manager/.env:/app/.env \
              spada-task-manager node dist/app.js

            echo "Deploy complete!"
